# SynthesisCore dependency lock
#
# Flux consumes SynthesisCore as a prebuilt APK launched via app_process. The two are
# separate repositories and stay that way: there is no submodule and no symlink. This lock
# pins exactly which SynthesisCore build Flux ships with, and scripts/verify-synthesiscore.sh
# refuses to package anything whose bytes do not match.
#
# Fields:
#   repository       owner/name of the SynthesisCore repository
#   version          release tag the artifact came from
#   commit           full 40-char commit SHA the release was built from
#   asset            file name of the release asset
#   sha256           SHA-256 of the exact artifact bytes (verified before use)
#   schema_provided  telemetry schema version this artifact emits
#   schema_min       lowest telemetry schema this Flux build can consume
#   schema_max       highest telemetry schema this Flux build can consume
#
# The build fails if sha256 does not match, and warns (with the exact remaining step) if
# schema_provided falls outside [schema_min, schema_max]. It never silently falls back to a
# "latest" build.

repository=elyraos-dev/SynthesisCore
version=v1.0.1
commit=4d82d8516c95fa6441ba942740a3f1844d853f4b
asset=SynthesisCore-v1.0.1.apk
sha256=08931b73e3c7bf37ed20af92c14eb2c02129cf4745f3ebf080c10022254a8b92
schema_provided=2
schema_min=2
schema_max=2

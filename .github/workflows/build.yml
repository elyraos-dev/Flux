name: Build Flux Tweaks

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'
      prerelease:
        description: 'Mark the release as a pre-release'
        type: boolean
        required: false
        default: false
      notify_telegram:
        description: 'Send the verified result to Telegram'
        type: boolean
        required: false
        default: false
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build.yml'
      - '.github/scripts/**'
      - 'java/**'
      - 'jni/**'
      - 'scripts/**'
      - 'module/**'
      - 'webui/**'
      - 'gamelist.txt'
      - 'version'

# Allow only one concurrent build workflows
concurrency:
  group: build
  cancel-in-progress: true

jobs:
  build:
    name: Build Flashable Zip
    runs-on: ubuntu-latest
    # Publishing a release needs write access to repository contents. Scoped to this job so the
    # default stays least-privilege; only the release upload elevates.
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true

      - name: NDK Setup
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r29

      - name: Bun Setup
        uses: oven-sh/setup-bun@v2

      - name: Build Flux Daemon
        run: ndk-build -j"$(nproc --all)"

      - name: Build WebUI
        working-directory: webui
        run: |
          bun install
          bun run build
          cp -r ./dist/* ../module/webroot

      - name: Compile Flashable Zip
        id: compileZip
        run: bash .github/scripts/compile_zip.sh

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v6
        with:
          name: flux-build
          path: ${{ steps.compileZip.outputs.zipName }}

      - name: Publish GitHub Release
        # Only on manual dispatch: pull_request and push builds have no release tag and must
        # not create releases. The default GITHUB_TOKEN is enough; no PAT.
        if: success() && github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Inputs pass through the environment, never interpolated into the script body, so a
          # crafted tag cannot inject shell.
          TAG: ${{ inputs.tag }}
          PRERELEASE: ${{ inputs.prerelease }}
          ZIP: ${{ steps.compileZip.outputs.zipName }}
          COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [ -z "${ZIP:-}" ] || [ ! -f "$ZIP" ]; then
            echo "::error::No flashable zip found to publish."
            exit 1
          fi

          # Generate the update manifest module managers poll (Magisk / KernelSU / APatch).
          # It must describe this exact tag and zip, so it is built here rather than committed.
          bash .github/scripts/gen_update_json.sh "$TAG" "$ZIP" update.json

          # Idempotent: create the release the first time, then re-upload (clobber) on re-runs
          # of the same tag rather than failing. changelog.md ships as an asset so the manifest
          # can pin its changelog URL to this release instead of a moving branch.
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG exists; uploading assets (clobber)."
            gh release upload "$TAG" "$ZIP" update.json changelog.md --clobber
          else
            FLAGS=()
            if [ "$PRERELEASE" = "true" ]; then FLAGS+=(--prerelease); fi
            gh release create "$TAG" "$ZIP" update.json changelog.md \
              --title "Flux ${TAG}" \
              --notes-file changelog.md \
              --target "$COMMIT" \
              "${FLAGS[@]}"
          fi

      # ── Notification ──────────────────────────────────────────────────────────
      # Decide whether this run may notify, using only the event and repository variables. No
      # secret is referenced here, so the decision is reachable on every run — including the
      # pull_request runs that must never see a credential.
      #
      # The previous condition (`env.CHAT_ID != '' && env.BOT_TOKEN != ''`) could not do this
      # job: it read the step's own secret env, so the secrets were already bound to the step
      # before the gate was consulted, and it treated "configured" as "permitted". Every PR
      # build therefore called the Telegram API. Nothing was ever posted only because the
      # configured chat id does not resolve — fixing that id would have started publishing
      # every pull request to the channel.
      - name: Resolve Telegram notification policy
        id: telegram_policy
        if: always()
        env:
          EVENT_NAME: ${{ github.event_name }}
          FLUX_TELEGRAM_ENABLED: ${{ vars.FLUX_TELEGRAM_ENABLED }}
          FLUX_TELEGRAM_BUILD_ENABLED: ${{ vars.FLUX_TELEGRAM_BUILD_ENABLED }}
          FLUX_TELEGRAM_RELEASE_ENABLED: ${{ vars.FLUX_TELEGRAM_RELEASE_ENABLED }}
          NOTIFY_TELEGRAM_INPUT: ${{ inputs.notify_telegram || false }}
        run: bash .github/scripts/telegram_policy.sh

      - name: Upload To Telegram
        id: telegram_send
        # Layered, and deliberately redundant:
        #   1. success()  — a failed build or a failed release never notifies.
        #   2. the literal pull_request check — the boundary that matters most is stated at the
        #      step itself, so it holds even if the policy script is wrong.
        #   3. the resolved policy — variables and the manual opt-in.
        # Secrets below are bound only if all three pass, so a pull_request run never has them.
        if: >-
          success()
          && github.event_name != 'pull_request'
          && steps.telegram_policy.outputs.should_send == 'true'
        # Scoped to this step only: telling a chat about a build is not part of building it, and
        # a notification error must never be reported as a build error or invalidate a release
        # that was already published. This is not a job-wide continue-on-error and must not
        # become one — that would hide real build and packaging failures.
        continue-on-error: true
        env:
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TITLE: Flux Tweaks
          ZIP: ${{ steps.compileZip.outputs.zipName }}
        run: |
          VERSION=$(git rev-list --count HEAD)
          export VERSION
          bash .github/scripts/telegram_bot.sh "$ZIP"
